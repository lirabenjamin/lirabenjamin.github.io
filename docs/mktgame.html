<script type="text/babel">
const { useState, useReducer, useMemo, useCallback } = React;

// ─── CONSTANTS ──────────────────────────────────────────────────────────────

const RECEPTIVITY = { democrat: 0.75, republican: 0.60 };
const MISPERCEIVED_REP = 0.15;
const TOTAL_ROUNDS = 10;
const ROUND_BUDGET = 100000;

// Town colors for history chart
const TOWN_COLORS = [
  '#16a34a','#ca8a04','#dc2626','#7c3aed','#0284c7','#db2777','#ea580c','#0891b2'
];

const TOWNS = [
  {
    id: 'harlan',
    name: 'Harlan County, KY',

  },
  {
    id: 'maricopa',
    name: 'Maricopa Suburbs, AZ',
    archetype: 'Sun Belt Metro',
    repSplit: 0.50, demSplit: 0.50,
    marketSize: 55000, competition: 0.65, pricePerConversion: 75,
  },
  {
    id: 'middlesex',
    name: 'Middlesex County, MA',
    archetype: 'Urban Northeast Metro',
    repSplit: 0.28, demSplit: 0.72,
    marketSize: 65000, competition: 0.90, pricePerConversion: 80,
  },
  {
    id: 'dane',
    name: 'Dane County, WI',
    archetype: 'College Town / Progressive Hub',
    repSplit: 0.22, demSplit: 0.78,
    marketSize: 40000, competition: 0.85, pricePerConversion: 72,
  },
  {
    id: 'multnomah',
    name: 'Multnomah County, OR',
    archetype: 'Pacific Coast Metro',
    repSplit: 0.20, demSplit: 0.80,
    marketSize: 50000, competition: 0.95, pricePerConversion: 78,
  },
];

// ─── PAYOFF LOGIC ────────────────────────────────────────────────────────────

function normalDraw(mean, sd) {
  // Box-Muller transform
  let u1 = Math.random(), u2 = Math.random();
  while (u1 === 0) u1 = Math.random();
  const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
  return mean + sd * z;
}

function computePayoff(town, allocation) {
  if (allocation <= 0) return 0;
  const { marketSize, repSplit, demSplit, competition, pricePerConversion } = town;
  const receptive = marketSize * (repSplit * RECEPTIVITY.republican + demSplit * RECEPTIVITY.democrat);
  // Logarithmic return on spend: log(1 + alloc/10000) / log(11)
  const allocFrac = Math.log1p(allocation / 10000) / Math.log1p(10);
  const compDiscount = Math.exp(-1.5 * competition);
  const mean = receptive * allocFrac * compDiscount * pricePerConversion;
  const sd = mean * 0.20 + Math.sqrt(allocation) * 2;
  return Math.max(0, normalDraw(mean, sd));
}

function computeExpectedROI(town, allocation) {
  // Deterministic expected value for debrief comparison
  if (allocation <= 0) return 0;
  const { marketSize, repSplit, demSplit, competition, pricePerConversion } = town;
  const receptive = marketSize * (repSplit * RECEPTIVITY.republican + demSplit * RECEPTIVITY.democrat);
  const allocFrac = Math.log1p(allocation / 10000) / Math.log1p(10);
  const compDiscount = Math.exp(-1.5 * competition);
  return receptive * allocFrac * compDiscount * pricePerConversion;
}

// Compute optimal single-round earnings via a grid search over 8-town portfolio
function computeOptimalSingleRound() {
  // Try 100k in each town and pick the best single allocation for reference
  // Actually: use a greedy gradient over discrete $10k steps
  let bestAlloc = Object.fromEntries(TOWNS.map(t => [t.id, 0]));
  let budget = ROUND_BUDGET;
  const step = 5000;
  const steps = budget / step;

  // Initialize
  let alloc = Object.fromEntries(TOWNS.map(t => [t.id, 0]));

  // Greedy: repeatedly add $5k to the town with highest marginal gain
  for (let i = 0; i < steps; i++) {
    let bestTown = null, bestGain = -Infinity;
    for (const town of TOWNS) {
      const current = computeExpectedROI(town, alloc[town.id]);
      const incremented = computeExpectedROI(town, alloc[town.id] + step);
      const gain = incremented - current;
      if (gain > bestGain) { bestGain = gain; bestTown = town.id; }
    }
    alloc[bestTown] += step;
  }
  return { alloc, total: TOWNS.reduce((s, t) => s + computeExpectedROI(t, alloc[t.id]), 0) };
}

const OPTIMAL = computeOptimalSingleRound();

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function fmt$(n) {
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1000) return '$' + Math.round(n / 1000) + 'k';
  return '$' + Math.round(n);
}

function fmtFull$(n) {
  return '$' + Math.round(n).toLocaleString();
}

function compLabel(c) {
  if (c <= 0.25) return { label: 'Low', cls: 'tag-low' };
  if (c <= 0.50) return { label: 'Medium', cls: 'tag-medium' };
  if (c <= 0.75) return { label: 'High', cls: 'tag-high' };
  return { label: 'Very High', cls: 'tag-veryhigh' };
}

function roundInsight(round) {
  if (round <= 3) return "Early days — keep exploring different markets!";
  if (round <= 6) return "Notice any patterns forming across markets?";
  if (round <= 9) return `${10 - round} rounds left — time to optimize your strategy.`;
  return "Final round complete. Let's see what you discovered.";
}

// ─── INITIAL STATE & REDUCER ─────────────────────────────────────────────────

const emptyAlloc = () => Object.fromEntries(TOWNS.map(t => [t.id, 0]));

const initialState = {
  screen: 'start',
  round: 1,
  cumulativeEarnings: 0,
  currentAllocation: emptyAlloc(),
  roundHistory: [],
  optimalEarnings: null,
  // settings chosen on start screen
  settings: {
    showEstReturn: false,
    budgetMode: 'fixed', // 'fixed' | 'performance'
  },
  roundBudget: ROUND_BUDGET,
};

function reducer(state, action) {
  switch (action.type) {
    case 'START_GAME':
      return { ...initialState, settings: action.settings, screen: 'briefing' };

    case 'BEGIN_ROUNDS':
      return { ...state, screen: 'allocation' };

    case 'SET_ALLOCATION':
      return {
        ...state,
        currentAllocation: { ...state.currentAllocation, [action.townId]: action.amount },
      };

    case 'RESET_ALLOCATION':
      return { ...state, currentAllocation: emptyAlloc() };

    case 'AUTOSCALE': {
      const total = Object.values(state.currentAllocation).reduce((a, b) => a + b, 0);
      if (total === 0) return state;
      const factor = state.roundBudget / total;
      const scaled = Object.fromEntries(
        Object.entries(state.currentAllocation).map(([k, v]) => [k, Math.round(v * factor / 1000) * 1000])
      );
      // Fix rounding drift
      const scaledTotal = Object.values(scaled).reduce((a, b) => a + b, 0);
      const diff = state.roundBudget - scaledTotal;
      if (diff !== 0) {
        const firstKey = Object.keys(scaled)[0];
        scaled[firstKey] += diff;
      }
      return { ...state, currentAllocation: scaled };
    }

    case 'SUBMIT_ALLOCATION': {
      const payouts = {};
      let roundTotal = 0;
      for (const town of TOWNS) {
        const alloc = state.currentAllocation[town.id];
        const p = computePayoff(town, alloc);
        payouts[town.id] = p;
        roundTotal += p;
      }
      const newEntry = {
        round: state.round,
        allocations: { ...state.currentAllocation },
        payouts,
        roundTotal,
      };
      const newHistory = [...state.roundHistory, newEntry];
      const isLast = state.round === TOTAL_ROUNDS;
      const nextBudget = state.settings.budgetMode === 'performance'
        ? Math.max(10000, Math.round(roundTotal / 1000) * 1000)
        : ROUND_BUDGET;
      return {
        ...state,
        screen: 'results',
        cumulativeEarnings: state.cumulativeEarnings + roundTotal,
        roundHistory: newHistory,
        roundBudget: nextBudget,
        optimalEarnings: isLast ? OPTIMAL.total * TOTAL_ROUNDS : null,
      };
    }

    case 'NEXT_ROUND':
      if (state.round === TOTAL_ROUNDS) {
        return { ...state, screen: 'debrief' };
      }
      return {
        ...state,
        screen: 'allocation',
        round: state.round + 1,
        currentAllocation: emptyAlloc(),
      };

    case 'RESTART':
      return { ...initialState, screen: 'start' };

    default:
      return state;
  }
}

// ─── SHARED COMPONENTS ───────────────────────────────────────────────────────

function PartisanBar({ repSplit, demSplit }) {

      <div className="dem-seg" style={{ width: `${dp}%`, background: '#2563eb', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, color: 'white' }}>
        {dp > 12 ? `${dp}% D` : ''}

}

function TownCard({ town, compact }) {

      <div style={{ display: 'flex', gap: 8, marginTop: 6, flexWrap: 'wrap' }}>
        <span style={{ fontSize: 12, color: '#374151' }}>👥 {popStr} potential customers</span>
        <span className={`tag ${cl.cls}`} style={{ display: 'inline-block', padding: '2px 8px', borderRadius: 9999, fontSize: 11, fontWeight: 700 }}>
          Competition: {cl.label}
        </span>
      </div>
    </div>
  );
}

}

function StartScreen({ dispatch }) {

      <div style={{ textAlign: 'center', maxWidth: 580 }}>
        <div style={{ fontSize: 48, marginBottom: 8 }}>🌿</div>
        <h1 style={{ fontSize: 36, fontWeight: 800, color: '#15803d', marginBottom: 8 }}>Green Market</h1>
        <p style={{ fontSize: 18, color: '#374151', marginBottom: 8, fontWeight: 600 }}>

        </p>
        <p style={{ fontSize: 15, color: '#6b7280', marginBottom: 28, lineHeight: 1.6 }}>
          You're the regional marketing director for <strong>EcoChoice</strong>, a company selling

        <div className="card" style={{ textAlign: 'left', marginBottom: 20, padding: 18 }}>

            <div>

        </div>

        <button className="btn-primary" style={{ fontSize: 18, padding: '14px 40px', marginBottom: 12 }}
          onClick={() => dispatch({ type: 'START_GAME', settings: { showEstReturn, budgetMode } })}>
          Start Game

        <div>
          <button

        {showExplainer && (

            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10, color: '#92400e' }}>
              Simulation Logic (Spoilers)
            </div>
            <p style={{ fontSize: 14, color: '#374151', lineHeight: 1.7, marginBottom: 10 }}>
              Each market has a hidden <strong>environmental receptivity</strong> rate — the fraction of
              residents who are likely to buy EcoChoice products:
            </p>
            <table style={{ width: '100%', fontSize: 14, marginBottom: 12 }}>
              <tbody>
                <tr>
                  <td style={{ padding: '4px 8px', fontWeight: 600 }}>Democrat voters</td>
                  <td style={{ padding: '4px 8px', color: '#2563eb', fontWeight: 700 }}>75% receptivity</td>
                </tr>
                <tr>
                  <td style={{ padding: '4px 8px', fontWeight: 600 }}>Republican voters</td>
                  <td style={{ padding: '4px 8px', color: '#dc2626', fontWeight: 700 }}>60% receptivity</td>
                  <td style={{ padding: '4px 8px', fontSize: 12, color: '#6b7280' }}>(most people assume ~15%)</td>
                </tr>
              </tbody>
            </table>
            <p style={{ fontSize: 14, color: '#374151', lineHeight: 1.7, marginBottom: 10 }}>
              The payoff formula is:
            </p>
            <div style={{ background: '#f3f4f6', borderRadius: 6, padding: '10px 14px', fontFamily: 'monospace', fontSize: 13, marginBottom: 10, lineHeight: 1.8 }}>
              receptive_customers = market_size × (R% × 0.60 + D% × 0.75)<br/>
              spend_fraction = log(1 + spend/10,000) / log(11)  <span style={{ color: '#6b7280' }}>← diminishing returns</span><br/>
              competition_discount = e^(−1.5 × competition)<br/>
              mean_revenue = receptive × spend_fraction × discount × price_per_conversion<br/>
              actual_revenue ~ Normal(mean, 20% noise)
            </div>
            <p style={{ fontSize: 14, color: '#374151', lineHeight: 1.7, marginBottom: 8 }}>
              <strong>Why Republican-leaning markets win:</strong> Their competition levels are much lower
              (0.15–0.30 vs 0.85–0.95 for heavily Democratic metros), and the price-per-conversion is
              higher ($100–$115 vs $70–$80) because these markets are underserved. The exponential
              competition penalty <code>e^(−1.5c)</code> means Very High competition markets lose
              ~74% of potential revenue, while Low competition markets lose only ~26%.
            </p>
            <p style={{ fontSize: 14, color: '#374151', lineHeight: 1.7 }}>
              <strong>Optimal strategy:</strong> Concentrate ~35% in Williamson, TN and ~35% in Harlan, KY,
              with the remainder in Hayes, NE and small amounts in the mixed markets.
              A Democrat-biased player (70% budget in D markets) earns ~76% less than optimal.
            </p>
          </div>
        )}

        <p style={{ marginTop: 16, fontSize: 13, color: '#9ca3af' }}>
          10 rounds · No sign-in required
        </p>
      </div>
    </div>
  );
}

// ─── ALLOCATION SCREEN ───────────────────────────────────────────────────────

function AllocationScreen({ state, dispatch }) {
  const { round, currentAllocation, cumulativeEarnings, settings, roundBudget } = state;
  const totalAllocated = Object.values(currentAllocation).reduce((a, b) => a + b, 0);
  const remaining = roundBudget - totalAllocated;
  const overBudget = totalAllocated > roundBudget;
  const nothingAllocated = totalAllocated === 0;

  const setAlloc = useCallback((townId, amount) => {
    dispatch({ type: 'SET_ALLOCATION', townId, amount: Math.max(0, Math.round(amount / 1000) * 1000) });
  }, [dispatch]);

  const fillPct = Math.min(1, totalAllocated / roundBudget);

  return (
    <div className="screen">
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 8, marginBottom: 20 }}>
        <div>
          <h2 style={{ fontSize: 24, fontWeight: 800, color: '#111827', margin: 0 }}>
            Round {round} <span style={{ color: '#6b7280', fontWeight: 400, fontSize: 16 }}>of {TOTAL_ROUNDS}</span>
          </h2>
          <p style={{ color: '#6b7280', fontSize: 14, margin: '4px 0 0' }}>
            Cumulative earnings so far: <strong style={{ color: '#15803d' }}>{fmtFull$(cumulativeEarnings)}</strong>
          </p>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontSize: 22, fontWeight: 800, color: overBudget ? '#dc2626' : '#15803d' }}>
            {overBudget ? `Over by ${fmtFull$(totalAllocated - roundBudget)}` : `${fmtFull$(remaining)} remaining`}
          </div>
          <div style={{ fontSize: 13, color: '#9ca3af' }}>
            Budget: {fmtFull$(roundBudget)}
            {settings.budgetMode === 'performance' && round > 1 && (
              <span style={{ color: '#ca8a04', marginLeft: 6 }}>(from last round's earnings)</span>
            )}
          </div>
        </div>
      </div>

      {/* Budget bar */}
      <div style={{ marginBottom: 20 }}>
        <div className="budget-bar-wrap">
          <div className="budget-bar-fill" style={{
            width: `${Math.min(100, fillPct * 100)}%`,
            background: overBudget ? '#dc2626' : '#16a34a',
          }} />
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#9ca3af', marginTop: 4 }}>
          <span>$0</span><span>Allocated: {fmtFull$(totalAllocated)}</span><span>{fmtFull$(roundBudget)}</span>
        </div>
      </div>

      {/* Town allocation cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12, marginBottom: 20 }}>
        {TOWNS.map(town => (
          <TownAllocationCard
            key={town.id}
            town={town}
            allocated={currentAllocation[town.id]}
            onChange={setAlloc}
            showEstReturn={settings.showEstReturn}
            roundBudget={roundBudget}
          />
        ))}
      </div>

      {/* Actions */}
      <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center', justifyContent: 'center' }}>
        <button className="btn-secondary" onClick={() => dispatch({ type: 'RESET_ALLOCATION' })}>
          Clear All
        </button>
        <button className="btn-secondary" onClick={() => dispatch({ type: 'AUTOSCALE' })} disabled={nothingAllocated}>
          Auto-scale to $100k
        </button>
        <button
          className="btn-primary"
          disabled={overBudget || nothingAllocated}
          onClick={() => dispatch({ type: 'SUBMIT_ALLOCATION' })}
        >
          Submit Allocations →
        </button>
      </div>
      {overBudget && (
        <p style={{ color: '#dc2626', textAlign: 'center', marginTop: 8, fontSize: 14 }}>
          You're over budget. Reduce your allocations before submitting.
        </p>
      )}
    </div>
  );
}

function TownAllocationCard({ town, allocated, onChange, showEstReturn, roundBudget }) {
  const pct = Math.round((allocated / roundBudget) * 100);
  const expectedROI = showEstReturn ? computeExpectedROI(town, allocated) : null;
  return (
    <div className="card" style={{ padding: 14 }}>
      <TownCard town={town} compact />
      <div style={{ marginTop: 12 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: '#374151' }}>Allocation</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: '#15803d' }}>{fmtFull$(allocated)} ({pct}%)</span>
        </div>
        <input
          type="range"
          min={0}
          max={roundBudget}
          step={5000}
          value={allocated}
          onChange={e => onChange(town.id, Number(e.target.value))}
          style={{ width: '100%', accentColor: '#16a34a', marginBottom: 6 }}
        />
        <div style={{ display: 'flex', gap: 8 }}>
          <input
            type="number"
            min={0}
            max={roundBudget}
            step={1000}
            value={allocated}
            onChange={e => onChange(town.id, Number(e.target.value))}
            style={{ flex: 1, padding: '6px 10px', border: '1px solid #d1d5db', borderRadius: 6, fontSize: 13, outline: 'none' }}
          />
          {showEstReturn && (
            <span style={{ fontSize: 12, color: '#9ca3af', alignSelf: 'center', whiteSpace: 'nowrap' }}>
              Est. return: {allocated > 0 ? fmt$(expectedROI) : '—'}
            </span>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── RESULTS SCREEN ───────────────────────────────────────────────────────────

function ResultsScreen({ state, dispatch }) {
  const { round, roundHistory, cumulativeEarnings } = state;
  const lastRound = roundHistory[roundHistory.length - 1];
  const prevRound = roundHistory.length >= 2 ? roundHistory[roundHistory.length - 2] : null;
  const isLast = round === TOTAL_ROUNDS;

  return (
    <div className="screen">
      <h2 style={{ fontSize: 24, fontWeight: 800, color: '#111827', marginBottom: 4 }}>
        Round {round} Results
      </h2>
      <p style={{ color: '#6b7280', marginBottom: 20, fontSize: 14 }}>{roundInsight(round)}</p>

      <div className="card" style={{ marginBottom: 20 }}>
        <table>
          <thead>
            <tr>
              <th>Market</th>
              <th style={{ textAlign: 'right' }}>Allocated</th>
              <th style={{ textAlign: 'right' }}>Revenue</th>
              <th style={{ textAlign: 'right' }}>ROI</th>
              {prevRound && <th style={{ textAlign: 'right', color: '#9ca3af' }}>vs Rd {round - 1}</th>}
            </tr>
          </thead>
          <tbody>
            {TOWNS.map(town => {
              const alloc = lastRound.allocations[town.id];
              const payout = lastRound.payouts[town.id];
              const roi = alloc > 0 ? (payout / alloc).toFixed(1) + 'x' : '—';
              const didInvest = alloc > 0;
              const prevPayout = prevRound ? prevRound.payouts[town.id] : null;
              const prevAlloc  = prevRound ? prevRound.allocations[town.id] : null;
              const prevROI    = (prevRound && prevAlloc > 0) ? prevPayout / prevAlloc : null;
              const currROI    = alloc > 0 ? payout / alloc : null;
              const roiDelta   = (currROI !== null && prevROI !== null)
                ? currROI - prevROI : null;
              return (
                <tr key={town.id} style={{ opacity: didInvest ? 1 : 0.45 }}>
                  <td>
                    <div style={{ fontWeight: 600, fontSize: 14 }}>{town.name}</div>
                    <div style={{ fontSize: 12, color: '#9ca3af' }}>{town.archetype}</div>
                  </td>
                  <td style={{ textAlign: 'right', fontSize: 14 }}>{didInvest ? fmtFull$(alloc) : '—'}</td>
                  <td style={{ textAlign: 'right', fontSize: 14, fontWeight: didInvest ? 700 : 400, color: didInvest ? (payout > alloc ? '#16a34a' : '#dc2626') : '#9ca3af' }}>
                    {didInvest ? fmtFull$(payout) : '—'}
                  </td>
                  <td style={{ textAlign: 'right', fontSize: 14 }}>{roi}</td>
                  {prevRound && (
                    <td style={{ textAlign: 'right', fontSize: 13, color: '#9ca3af' }}>
                      {prevAlloc > 0
                        ? <span style={{ color: roiDelta === null ? '#9ca3af' : roiDelta > 0 ? '#16a34a' : roiDelta < 0 ? '#dc2626' : '#9ca3af' }}>
                            {prevROI !== null ? prevROI.toFixed(1) + 'x' : '—'}
                            {roiDelta !== null && (
                              <span style={{ fontSize: 11, marginLeft: 4 }}>
                                ({roiDelta > 0 ? '+' : ''}{roiDelta.toFixed(1)})
                              </span>
                            )}
                          </span>
                        : <span style={{ color: '#e5e7eb' }}>—</span>
                      }
                    </td>
                  )}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: prevRound ? '1fr 1fr 1fr' : '1fr 1fr', gap: 12, marginBottom: 24 }}>
        <div className="card" style={{ padding: 16, textAlign: 'center' }}>
          <div style={{ fontSize: 12, color: '#6b7280', marginBottom: 4 }}>This Round</div>
          <div style={{ fontSize: 26, fontWeight: 800, color: '#15803d' }}>{fmtFull$(lastRound.roundTotal)}</div>
        </div>
        {prevRound && (
          <div className="card" style={{ padding: 16, textAlign: 'center', border: '1px solid #e5e7eb' }}>
            <div style={{ fontSize: 12, color: '#9ca3af', marginBottom: 4 }}>Round {round - 1}</div>
            <div style={{ fontSize: 26, fontWeight: 800, color: '#6b7280' }}>{fmtFull$(prevRound.roundTotal)}</div>
            <div style={{ fontSize: 12, marginTop: 4, color: lastRound.roundTotal >= prevRound.roundTotal ? '#16a34a' : '#dc2626', fontWeight: 600 }}>
              {lastRound.roundTotal >= prevRound.roundTotal ? '▲' : '▼'}{' '}
              {fmt$(Math.abs(lastRound.roundTotal - prevRound.roundTotal))}
            </div>
          </div>
        )}
        <div className="card" style={{ padding: 16, textAlign: 'center' }}>
          <div style={{ fontSize: 12, color: '#6b7280', marginBottom: 4 }}>Cumulative Total</div>
          <div style={{ fontSize: 26, fontWeight: 800, color: '#111827' }}>{fmtFull$(cumulativeEarnings)}</div>
        </div>
      </div>

      <div style={{ textAlign: 'center' }}>
        <button
          className="btn-primary"
          style={{ fontSize: 17 }}
          onClick={() => dispatch({ type: 'NEXT_ROUND' })}
        >
          {isLast ? 'See Final Debrief →' : `Begin Round ${round + 1} →`}
        </button>
      </div>
    </div>
  );
}

// ─── DEBRIEF SCREEN ───────────────────────────────────────────────────────────

function DebriefScreen({ state, dispatch }) {
  const { cumulativeEarnings, roundHistory, optimalEarnings } = state;
  const optEarn = optimalEarnings || (OPTIMAL.total * TOTAL_ROUNDS);
  const pctOfOptimal = Math.round((cumulativeEarnings / optEarn) * 100);

  // Compute per-town totals
  const townStats = TOWNS.map(town => {
    let totalAlloc = 0, totalPayout = 0;
    for (const rh of roundHistory) {
      totalAlloc += rh.allocations[town.id] || 0;
      totalPayout += rh.payouts[town.id] || 0;
    }
    const avgROI = totalAlloc > 0 ? totalPayout / totalAlloc : 0;
    const optAlloc = OPTIMAL.alloc[town.id];
    const optReturn = computeExpectedROI(town, optAlloc) * TOTAL_ROUNDS;
    return { town, totalAlloc, totalPayout, avgROI, optAlloc, optReturn };
  });

  // Sort by R split for the debrief table
  const sortedByR = [...townStats].sort((a, b) => b.town.repSplit - a.town.repSplit);

  return (
    <div className="screen">
      <div style={{ textAlign: 'center', marginBottom: 32 }}>

        <h2 style={{ fontSize: 30, fontWeight: 800, color: '#111827', marginBottom: 4 }}>Campaign Complete!</h2>

      {/* Panel 1: Performance */}

        <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>Your Performance</h3>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 16, flexWrap: 'wrap' }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 12, color: '#6b7280' }}>Your Total Revenue</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: '#15803d' }}>{fmtFull$(cumulativeEarnings)}</div>
          </div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 12, color: '#6b7280' }}>Expected Optimal</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: '#6b7280' }}>{fmtFull$(optEarn)}</div>
          </div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 12, color: '#6b7280' }}>You Achieved</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: pctOfOptimal >= 80 ? '#15803d' : pctOfOptimal >= 60 ? '#ca8a04' : '#dc2626' }}>
              {pctOfOptimal}% of optimal

          </div>
        </div>
        {/* Progress bar */}
        <div style={{ height: 12, background: '#e5e7eb', borderRadius: 6, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${Math.min(100, pctOfOptimal)}%`, background: pctOfOptimal >= 80 ? '#16a34a' : pctOfOptimal >= 60 ? '#ca8a04' : '#dc2626', borderRadius: 6 }} />
        </div>
        <p style={{ fontSize: 13, color: '#6b7280', marginTop: 8 }}>
          Optimal strategy: spread investments toward Republican-leaning markets where competition is low and price-per-conversion is high.
        </p>
      </div>

      {/* Panel 2: Investment History */}
      <div className="card debrief-panel" style={{ marginBottom: 24 }}>
        <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Where You Invested Over Time</h3>
        <p style={{ fontSize: 13, color: '#6b7280', marginBottom: 12 }}>
          Each bar shows how you split your $100k that round. Did your strategy shift?
        </p>
        <div style={{ marginBottom: 8 }}>
          {/* Legend */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 10 }}>
            {TOWNS.map((town, i) => (
              <div key={town.id} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 11 }}>

        <p style={{ fontSize: 14, color: '#374151', lineHeight: 1.7 }}>
          Republican markets are underserved by green brands. Lower competition means your dollar
          goes further — and the customers are already there. You just have to show up.
        </p>
      </div>

      <div style={{ textAlign: 'center', paddingBottom: 40 }}>
        <button className="btn-primary" style={{ fontSize: 17 }} onClick={() => dispatch({ type: 'RESTART' })}>
          Play Again
        </button>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────

function App() {
  const [state, dispatch] = useReducer(reducer, initialState);

  switch (state.screen) {
    case 'start':    return <StartScreen dispatch={dispatch} />;
    case 'briefing': return <BriefingScreen dispatch={dispatch} settings={state.settings} />;
    case 'allocation': return <AllocationScreen state={state} dispatch={dispatch} />;
    case 'results':  return <ResultsScreen state={state} dispatch={dispatch} />;
    case 'debrief':  return <DebriefScreen state={state} dispatch={dispatch} />;
    default: return null;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
